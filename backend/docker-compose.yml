services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: edtech_platform
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/schema/edtech_platform.sql:/docker-entrypoint-initdb.d/01-edtech-platform.sql:ro

  api-gateway:
    build: ./services/api-gateway
    environment:
      PORT: 3000
      IAM_SERVICE_URL: http://iam-service:3001
      ACADEMIC_SERVICE_URL: http://academic-service:3002
      COMMERCE_SERVICE_URL: http://commerce-service:3003
      LIVE_EXAM_SERVICE_URL: http://live-exam-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
    ports:
      - "3000:3000"
    depends_on:
      - iam-service

  iam-service:
    build: ./services/iam-service
    environment:
      PORT: 3001
      JWT_SECRET: change-this-secret-in-env
      JWT_EXPIRES_IN: 1d
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: edtech_platform
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy

  academic-service:
    build: ./services/academic-service
    environment:
      PORT: 3002
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: edtech_platform
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy

  commerce-service:
    build: ./services/commerce-service
    environment:
      PORT: 3003
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: edtech_platform
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3003:3003"
    depends_on:
      mysql:
        condition: service_healthy

  live-exam-service:
    build: ./services/live-exam-service
    environment:
      PORT: 3004
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: edtech_platform
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3004:3004"
    depends_on:
      mysql:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    environment:
      PORT: 3005
    ports:
      - "3005:3005"

volumes:
  mysql-data:
